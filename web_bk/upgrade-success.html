<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Clauge Pro</title>
<meta name="description" content="Your Clauge Pro subscription is active. Return to the app to continue.">
<meta name="theme-color" content="#0a0d14">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="Clauge">
<link rel="manifest" href="/site.webmanifest">
<link rel="stylesheet" href="design.css">
<style>
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  .us-wrap {
    position: relative; z-index: 1;
    width: min(560px, calc(100% - 64px));
    padding: 48px;
    border: 1px solid var(--rule-2);
    background: var(--bg-plate);
  }
  .us-wrap::after {
    content: ""; position: absolute; inset: 4px;
    border: 1px solid var(--rule); pointer-events: none;
  }
  .us-rail {
    display: grid;
    grid-template-columns: max-content 1fr max-content;
    gap: 18px; align-items: center;
    font-family: var(--f-mono); font-size: 10.5px;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-3);
    padding-bottom: 14px; margin-bottom: 28px;
    border-bottom: 1px dashed var(--rule-2);
  }
  .us-rail .key { color: var(--accent); font-weight: 500; }
  .us-rail .line { border-top: 1px dashed var(--rule-2); height: 1px; }
  .us-rail .end { color: var(--ink-4); }
  .us-logo {
    width: 56px; height: 56px;
    margin: 0 0 22px;
    display: block;
  }
  .us-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 10px; margin-bottom: 18px;
    font-family: var(--f-mono); font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    background: var(--accent-soft);
  }
  .us-title {
    font-family: var(--f-display); font-weight: 800;
    font-size: clamp(36px, 4.8vw, 56px);
    line-height: 0.96; letter-spacing: -0.012em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 0 14px;
  }
  .us-title em {
    font-style: normal; font-weight: 900;
    color: var(--accent);
  }
  .us-sub {
    font-family: var(--f-mono); font-size: 13px;
    line-height: 1.6; color: var(--ink-2);
    margin: 0 0 28px;
    max-width: 44ch;
  }
  .us-actions { display: flex; flex-wrap: wrap; gap: 12px; }
  .us-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 13px 18px;
    font-family: var(--f-mono); font-size: 11px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    border: 1px solid var(--accent);
    background: var(--accent); color: var(--bg);
    cursor: pointer;
    transition: background .2s var(--ease), transform .12s var(--ease);
  }
  .us-btn:hover { background: var(--accent-2); transform: translateY(-1px); }
  .us-btn-ghost {
    background: transparent; color: var(--ink-2);
    border-color: var(--ink-4);
  }
  .us-btn-ghost:hover { color: var(--ink); border-color: var(--ink-2); background: transparent; }
</style>
</head>
<body>
<div class="us-wrap">
  <div class="us-rail">
    <span class="key">RECEIPT / 00</span>
    <span class="line"></span>
    <span class="end">clauge.in</span>
  </div>

  <img class="us-logo" src="clauge-mark.svg" alt="" />

  <span class="us-eyebrow">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12" />
    </svg>
    Payment received
  </span>

  <h1 class="us-title">Welcome to<br /><em>Clauge Pro.</em></h1>
  <p class="us-sub">Your subscription is active. Return to the app to continue where you left off.</p>

  <div class="us-actions">
    <button type="button" class="us-btn" id="open-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
      </svg>
      Open Clauge
    </button>
    <a class="us-btn us-btn-ghost" href="/">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/>
      </svg>
      Home
    </a>
  </div>
</div>

<script>
(() => {
  // Build the deep link from the current query string. Polar appends
  // ?ref=<user_id>&plan=<monthly|yearly|lifetime>&customer_session_token=<...>.
  // The desktop app's deep-link handler reads those off the URL.
  const qs = window.location.search || '';
  const deepLink = 'clauge://checkout-success' + qs;

  function openInApp() { window.location.href = deepLink; }

  // Best-effort auto-open on first paint so users with Clauge installed
  // land back in the app without clicking. Manual button is the fallback.
  setTimeout(openInApp, 400);

  document.getElementById('open-btn').addEventListener('click', openInApp);
})();
</script>
</body>
</html>
