name = "clauge-gh-auth"
main = "src/index.js"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# Worker handles:
#   /auth/token*       — legacy GitHub OAuth exchange (deprecated, kept for 1 release)
#   /api/auth/*        — cloud auth (exchange, me, link, unlink, refresh)
#   /api/sync/*        — per-domain blob sync
#   /api/billing/*     — Polar webhook + checkout + portal + public pricing
#   /api/ai/*          — Clauge AI proxy (chat SSE, balance, usage)
# Pages handles every other path on clauge.in (marketing site, callback HTML, Pages Functions like /api/contact).
routes = [
  { pattern = "clauge.in/auth/token*",    zone_name = "clauge.in" },
  { pattern = "clauge.in/api/auth/*",     zone_name = "clauge.in" },
  { pattern = "clauge.in/api/sync/*",     zone_name = "clauge.in" },
  { pattern = "clauge.in/api/billing/*",  zone_name = "clauge.in" },
  { pattern = "clauge.in/api/ai/*",       zone_name = "clauge.in" }
]

[vars]
GITHUB_CLIENT_ID = "Ov23liXcWby6XVM80TfG"
GOOGLE_CLIENT_ID = "361959797138-ahsfia59q9cf6h6njln6qt26jk763jp7.apps.googleusercontent.com"
ALLOWED_ORIGIN   = "https://clauge.in"

# Secrets — set via `wrangler secret put <NAME>`
#   GITHUB_CLIENT_SECRET
#   GOOGLE_CLIENT_SECRET

[[d1_databases]]
binding       = "CLAUGE_DB"
database_name = "clauge-db"
database_id   = "6e5fa767-317c-48b9-94ab-6ac0066a00e9"

[[kv_namespaces]]
binding = "CLAUGE_KV"
id      = "7367f7559b4e49adbdf02cfb18c07294"

[triggers]
crons = ["0 */6 * * *"]
