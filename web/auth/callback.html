<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clauge — Connecting to GitHub</title>
<meta name="theme-color" content="#0a0d14">
<link rel="stylesheet" href="../design.css">
<style>
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  .card {
    position: relative; z-index: 1;
    text-align: center;
    width: min(480px, calc(100% - 48px));
    padding: 40px;
    border: 1px solid var(--rule-2);
    background: var(--bg-plate);
  }
  .card::after {
    content: ""; position: absolute; inset: 4px;
    border: 1px solid var(--rule); pointer-events: none;
  }
  .card img { margin: 0 auto 18px; width: 48px; height: 48px; }
  h1 {
    font-family: var(--f-display); font-weight: 800;
    font-size: 26px; text-transform: uppercase; letter-spacing: -0.01em;
    color: var(--ink); margin-bottom: 10px;
  }
  p { font-family: var(--f-mono); font-size: 13px; color: var(--ink-2); line-height: 1.6; margin-bottom: 20px; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--rule-2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #f85149; }
  .success { color: #3fb950; }
  a { color: var(--accent); border-bottom: 1px dashed currentColor; }
  a:hover { color: var(--accent-2); }
</style>
</head>
<body>
<div class="bg-field" aria-hidden="true"></div>
<div class="card">
  <img src="../clauge-mark.svg" alt="Clauge" style="width:64px;height:64px;margin-bottom:16px;" />
  <h1 id="title">Connecting to GitHub…</h1>
  <div class="spinner" id="spinner"></div>
  <p id="message">Handing off to Clauge…</p>
</div>
<script>
(() => {
  const title = document.getElementById('title');
  const message = document.getElementById('message');
  const spinner = document.getElementById('spinner');

  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    title.textContent = 'Authorization Failed';
    message.innerHTML = '<span class="error">GitHub returned: ' + escapeHtml(error) + '</span><br><br>Close this tab and try again from Clauge.';
    spinner.style.display = 'none';
    return;
  }

  if (!code) {
    title.textContent = 'Missing Authorization Code';
    message.innerHTML = '<span class="error">No code received from GitHub.</span><br><br>Close this tab and try again from Clauge.';
    spinner.style.display = 'none';
    return;
  }

  title.textContent = 'Opening Clauge…';
  message.innerHTML = 'If the app does not open automatically, <a id="manual-link" href="#">click here</a>.';
  spinner.style.display = 'none';

  const deepLink = 'clauge://oauth-callback?provider=github&code=' + encodeURIComponent(code);
  document.getElementById('manual-link').href = deepLink;
  window.location.href = deepLink;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
})();
</script>
</body>
</html>
